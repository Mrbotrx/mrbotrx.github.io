<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB TV (BDXI) Premium V9</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#050816,#0b1120,#111827);
color:white;
}

.header{
text-align:center;
padding:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.1);
}
.header h1{
font-size:36px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:700;
letter-spacing:2px;
}
.header p{color:#94a3b8; font-size:16px; margin-top:8px;}

/* CATEGORY - modern pills */
.categories{
display:flex;
justify-content:center;
gap:10px;
padding:12px 20px;
flex-wrap:wrap;
background:rgba(255,255,255,0.03);
border-radius:16px;
margin:10px;
}
.cat-btn{
padding:10px 22px;
border:none;
border-radius:50px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:600;
transition:all 0.3s;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.cat-btn:hover{background:#2563eb; transform:translateY(-1px);}
.cat-btn.active{background:linear-gradient(90deg,#2563eb,#1d4ed8); box-shadow:0 0 0 3px rgba(37,99,235,0.5);}

/* LAYOUT */
.container{display:flex;gap:15px;padding:15px;}
.player{
flex:2;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:20px;
backdrop-filter:blur(10px);
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.video-container{
position:relative;
width:100%;
padding-top:56.25%; /* 16:9 */
overflow:hidden;
border-radius:16px;
background:#000;
box-shadow:0 8px 25px rgba(0,0,0,0.5);
}
.video-container video{
position:absolute;
top:0; left:0;
width:100%; height:100%;
object-fit:contain;
background:black;
border-radius:16px;
}

/* CUSTOM CONTROLS - floating bar */
.controls{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.75);
backdrop-filter:blur(12px);
padding:10px 16px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
width:calc(100% - 30px);
z-index:10;
box-shadow:0 4px 20px rgba(0,0,0,0.6);
}
.controls button{
background:none;
border:none;
color:white;
font-size:20px;
cursor:pointer;
padding:6px 10px;
border-radius:8px;
transition:0.3s;
}
.controls button:hover{
background:rgba(255,255,255,0.15);
}
.controls input[type=range]{
flex:1;
margin:0 8px;
accent-color:#38bdf8;
}

/* NOW PLAYING */
.now{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
padding:8px 20px;
border-radius:12px;
font-size:17px;
font-weight:600;
color:#38bdf8;
white-space:nowrap;
z-index:10;
}

/* SIDEBAR - cleaner */
.sidebar{
flex:1;
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:15px;
height:70vh;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.search{
position:relative;
margin-bottom:12px;
}
.search input{
width:100%;
padding:12px 16px 12px 42px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
outline:none;
font-size:15px;
}
.search input:focus{
background:#334155;
}
.search::before{
content:"🔍";
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
color:#64748b;
font-size:18px;
}

/* CHANNEL - modern cards */
.channel{
display:flex;
gap:12px;
align-items:center;
padding:14px 16px;
margin:8px 0;
border-radius:14px;
cursor:pointer;
background:rgba(255,255,255,0.03);
transition:all 0.25s;
}
.channel:hover{
background:rgba(56,189,248,0.12);
transform:translateX(6px);
}
.channel.active{
background:linear-gradient(90deg,#2563eb,#1d4ed8);
box-shadow:0 0 0 3px rgba(37,99,235,0.4);
}
.channel img{
width:48px;
height:48px;
border-radius:10px;
object-fit:cover;
border:2px solid rgba(255,255,255,0.1);
}

/* TELEGRAM - bigger & glowing */
.telegram{
position:fixed;bottom:25px;right:25px;
width:68px;height:68px;
border-radius:50%;
background:linear-gradient(135deg,#0088cc,#00b0ff);
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
text-decoration:none;
color:white;
box-shadow:0 0 25px #0088cc,
          0 0 45px rgba(0,136,204,0.5);
transition:0.3s;
}
.telegram:hover{
transform:scale(1.1);
box-shadow:0 0 35px #0088cc,
          0 0 60px rgba(0,136,204,0.7);
}

/* MOBILE */
@media(max-width:900px){
.container{flex-direction:column;}
.sidebar{height:auto;max-height:45vh;}
}
</style>
</head>
<body>

<div class="header">
<h1>📺 KB TV (BDXI)</h1>
<p>Premium Live Streaming V9 • Custom Player Skin</p>
</div>

<!-- CATEGORY FILTER -->
<div class="categories" id="categories"></div>

<div class="container">

<!-- PLAYER -->
<div class="player">
<div class="video-container">
<video id="video"></video>
</div>
<div class="controls">
  <button id="playPause">⏯</button>
  <input type="range" id="seek" value="0" min="0" max="100">
  <button id="mute">🔇</button>
  <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
  <button id="fullscreen">⛶</button>
</div>
<div class="now" id="now">Loading...</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="search">
<input type="text" id="search" placeholder="Search Channel...">
</div>
<div id="list"></div>
</div>

</div>

<a class="telegram" href="https://t.me/iptvlinksm3u8" target="_blank">📢</a>

<script>
const video=document.getElementById("video");
const list=document.getElementById("list");
const now=document.getElementById("now");
const search=document.getElementById("search");
const categoriesDiv=document.getElementById("categories");
const playPause=document.getElementById("playPause");
const seek=document.getElementById("seek");
const mute=document.getElementById("mute");
const volume=document.getElementById("volume");
const fullscreen=document.getElementById("fullscreen");

let channels=[],filtered=[],currentCat="ALL",hls;

/* PLAY */
function play(url,name){
  now.innerText="Now Playing: "+name;
  localStorage.setItem("lastChannel",JSON.stringify({url,name}));
  if(hls) hls.destroy();
  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {video.src=url;}
}

/* RENDER CHANNELS */
function render(data){
  list.innerHTML="";
  data.forEach((ch)=>{
    const div=document.createElement("div");
    div.className="channel";
    div.innerHTML=`<img src="\( {ch.logo||'https://via.placeholder.com/48x48'}" loading="lazy"><div> \){ch.name}</div>`;
    div.onclick=()=>{
      document.querySelectorAll(".channel").forEach(c=>c.classList.remove("active"));
      div.classList.add("active");
      play(ch.url,ch.name);
    };
    list.appendChild(div);
  });
  const last=JSON.parse(localStorage.getItem("lastChannel")||"null");
  if(last){play(last.url,last.name);}else if(data.length>0){list.firstChild.click();}
}

/* CATEGORY FILTER */
function filterCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  applyFilter();
}
function applyFilter(){
  let data=channels;
  if(currentCat!=="ALL"){data=data.filter(c=>c.group===currentCat);}
  const q=search.value.toLowerCase();
  data=data.filter(c=>c.name.toLowerCase().includes(q));
  filtered=data;
  render(filtered);
}
search.addEventListener("input",applyFilter);

/* LOAD M3U */
fetch("index.m3u").then(res=>res.text()).then(text=>{
  const lines=text.split("\n");let groups=new Set(["ALL"]);
  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith("#EXTINF")){
      const name=line.split(",").pop().trim();
      const logo=(lines[i].match(/tvg-logo="(.*?)"/)||[])[1]||"";
      const group=(lines[i].match(/group-title="(.*?)"/)||[])[1]||"Other";
      const url=lines[i+1]?lines[i+1].trim():"";
      if(url.startsWith("http")){channels.push({name,logo,url,group});groups.add(group);}
    }
  }
  now.innerText=channels.length+" Channels Loaded";
  categoriesDiv.innerHTML="";
  groups.forEach(g=>{
    const btn=document.createElement("button");
    btn.className="cat-btn"+(g==="ALL"?" active":"");
    btn.innerText=g;
    btn.onclick=()=>filterCat(g,btn);
    categoriesDiv.appendChild(btn);
  });
  applyFilter();
});

/* CUSTOM CONTROLS */
playPause.onclick=()=>{video.paused?video.play():video.pause();};
mute.onclick=()=>{video.muted=!video.muted;};
volume.oninput=()=>{video.volume=volume.value;};
fullscreen.onclick=()=>{video.requestFullscreen();};
video.addEventListener("timeupdate",()=>{
  seek.value=(video.currentTime/video.duration)*100||0;
});
seek.oninput=()=>{video.currentTime=(seek.value/100)*video.duration;};
</script>

</body>
</html>

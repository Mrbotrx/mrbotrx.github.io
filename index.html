<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live BDXI TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {margin:0;font-family:Arial,sans-serif;background:#121212;color:white;text-align:center;}
header {background:#1f1f1f;padding:20px;font-size:24px;color:#00ffd5;}
video {margin-top:20px;width:90%;max-width:900px;border-radius:10px;}
footer {margin-top:20px;padding:10px;background:#1f1f1f;color:#aaa;}
</style>
</head>
<body>

<header>📺 Live BDXI TV - ALL TIME NEW</header>

<video id="video" controls autoplay></video>

<footer>© KBprotv - index.m3u playable in browser</footer>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const video = document.getElementById("video");
const playlistUrl = "http://mrbotrx.github.io/index.m3u";

// HLS.js will load m3u playlist and play in browser
if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(playlistUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,function() {
        video.play();
    });
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = playlistUrl;
    video.addEventListener('loadedmetadata', function() {
        video.play();
    });
} else {
    alert("Your browser does not support HLS playback. Use VLC or other IPTV player.");
}
</script>

</body>
</html>

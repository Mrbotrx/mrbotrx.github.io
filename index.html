<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB TV (BDXI) Premium V2</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1120;
color:#fff;
overflow-x:hidden;
}

.header{
padding:20px;
text-align:center;
background:linear-gradient(135deg,#0f172a,#1e40af);
border-bottom:2px solid #2563eb;
}

.header h1{
font-size:32px;
margin-bottom:5px;
}

.header p{
color:#cbd5e1;
}

.stats{
margin-top:10px;
display:flex;
justify-content:center;
gap:20px;
font-size:14px;
}

.partner{
margin-top:15px;
display:inline-block;
padding:12px;
background:rgba(255,255,255,.08);
border-radius:12px;
}

.partner a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}

.main{
display:flex;
flex-wrap:wrap;
}

.player-area{
flex:2;
min-width:300px;
padding:15px;
}

.sidebar{
flex:1;
min-width:300px;
background:#111827;
height:calc(100vh - 120px);
overflow-y:auto;
}

video{
width:100%;
background:#000;
border-radius:12px;
}

.now-playing{
margin-top:10px;
font-size:20px;
font-weight:bold;
}

.search{
padding:12px;
background:#111827;
}

.search input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1f2937;
color:#fff;
outline:none;
}

.channel{
display:flex;
align-items:center;
gap:10px;
padding:12px;
border-bottom:1px solid #1f2937;
cursor:pointer;
transition:.3s;
}

.channel:hover{
background:#1e293b;
}

.channel.active{
background:#2563eb;
}

.channel img{
width:42px;
height:42px;
border-radius:8px;
object-fit:cover;
background:#222;
}

.telegram{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
background:#0088cc;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
color:white;
box-shadow:0 0 15px rgba(0,136,204,.5);
}

.footer{
padding:15px;
text-align:center;
background:#111827;
color:#94a3b8;
}

@media(max-width:768px){
.main{
flex-direction:column;
}
.sidebar{
height:auto;
}
}
</style>
</head>
<body>

<div class="header">

<h1>📺 KB TV (BDXI)</h1>

<p>Bangladesh • India • Sports • Entertainment</p>

<div class="stats">
<span id="channelCount">0 Channels</span>
<span id="clock">00:00:00</span>
</div>

<div class="partner">
📺 Partner TV:
<a href="https://kbtvpro.totalh.net" target="_blank">
kbtvpro.totalh.net
</a>

<br><br>

💻 Git Partner:
<a href="https://github.com/Mrbotrx/All-FREE-TV/" target="_blank">
Visit GitHub
</a>

<br><br>

📢 Telegram:
<a href="https://t.me/iptvlinksm3u8" target="_blank">
@iptvlinksm3u8
</a>
</div>

</div>

<div class="main">

<div class="player-area">

<video id="video" controls autoplay playsinline></video>

<div class="now-playing" id="currentChannel">
Select Channel
</div>

</div>

<div class="sidebar">

<div class="search">
<input type="text" id="searchInput"
placeholder="🔍 Search Channel">
</div>

<div id="channelList"></div>

</div>

</div>

<a class="telegram"
href="https://t.me/iptvlinksm3u8"
target="_blank">
📢
</a>

<div class="footer">
© 2026 KB TV (BDXI) Premium V2
</div>

<script>

const video = document.getElementById("video");
const channelList = document.getElementById("channelList");
const currentChannel = document.getElementById("currentChannel");
const searchInput = document.getElementById("searchInput");

let channels = [];
let hls;

function updateClock(){
const now = new Date();
document.getElementById("clock").innerText =
now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

function playChannel(url,name){

currentChannel.innerText =
"Now Playing: " + name;

if(hls){
hls.destroy();
}

if(Hls.isSupported()){

hls = new Hls({
enableWorker:true,
lowLatencyMode:true
});

hls.loadSource(url);
hls.attachMedia(video);

}else{

video.src = url;

}

}

function renderChannels(list){

channelList.innerHTML = "";

list.forEach((ch,index)=>{

const div = document.createElement("div");
div.className = "channel";

div.innerHTML = `
<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/42'">
<div>${ch.name}</div>
`;

div.onclick = ()=>{

document.querySelectorAll(".channel")
.forEach(c=>c.classList.remove("active"));

div.classList.add("active");

playChannel(ch.url,ch.name);

};

channelList.appendChild(div);

if(index===0 && !video.src){
div.classList.add("active");
playChannel(ch.url,ch.name);
}

});

}

fetch("index.m3u")

.then(res=>res.text())

.then(text=>{

const lines = text.split("\n");

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

const info = lines[i];

const name =
info.split(",").pop().trim();

const logoMatch =
info.match(/tvg-logo="([^"]+)"/);

const logo =
logoMatch ? logoMatch[1] : "";

const url =
lines[i+1] ? lines[i+1].trim() : "";

if(url.startsWith("http")){

channels.push({
name,
logo,
url
});

}

}

}

document.getElementById("channelCount")
.innerText =
channels.length + " Channels";

renderChannels(channels);

})

.catch(()=>{

channelList.innerHTML =
"<div style='padding:20px'>Failed to load index.m3u</div>";

});

searchInput.addEventListener("input",()=>{

const value =
searchInput.value.toLowerCase();

const filtered =
channels.filter(ch=>
ch.name.toLowerCase().includes(value)
);

renderChannels(filtered);

});

</script>

</body>
</html>

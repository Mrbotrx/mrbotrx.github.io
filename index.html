<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB TV (BDXI) Premium V5</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#050816,#0b1120,#111827);
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.header h1{
font-size:34px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header p{
color:#94a3b8;
}

/* CATEGORY */
.categories{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
flex-wrap:wrap;
}

.cat-btn{
padding:10px 18px;
border:none;
border-radius:12px;
cursor:pointer;
background:#1e293b;
color:white;
transition:0.3s;
}

.cat-btn:hover{
background:#2563eb;
}

.cat-btn.active{
background:linear-gradient(90deg,#2563eb,#1d4ed8);
}

/* LAYOUT */
.container{
display:flex;
gap:15px;
padding:15px;
}

.player{
flex:2;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:20px;
backdrop-filter:blur(10px);
}

video{
width:100%;
border-radius:15px;
background:black;
}

.now{
margin-top:10px;
font-size:18px;
color:#38bdf8;
font-weight:bold;
}

/* SIDEBAR */
.sidebar{
flex:1;
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:10px;
height:70vh;
overflow:auto;
}

.search input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#1e293b;
color:white;
outline:none;
}

/* CHANNEL */
.channel{
display:flex;
gap:10px;
align-items:center;
padding:10px;
margin:8px;
border-radius:12px;
cursor:pointer;
background:rgba(255,255,255,0.03);
transition:0.3s;
}

.channel:hover{
background:rgba(56,189,248,0.2);
transform:translateY(-2px);
}

.channel.active{
background:linear-gradient(90deg,#2563eb,#1d4ed8);
}

.channel img{
width:45px;
height:45px;
border-radius:10px;
}

/* TELEGRAM */
.telegram{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#0088cc;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
color:white;
box-shadow:0 0 20px #0088cc;
}

/* MOBILE */
@media(max-width:900px){
.container{
flex-direction:column;
}
.sidebar{
height:auto;
max-height:50vh;
}
}
</style>
</head>

<body>

<div class="header">
<h1>📺 KB TV (BDXI)</h1>
<p>Premium Live Streaming V5</p>
</div>

<!-- CATEGORY FILTER -->
<div class="categories">
<button class="cat-btn active" onclick="filterCat('ALL',this)">ALL</button>
<button class="cat-btn" onclick="filterCat('BD',this)">BD</button>
<button class="cat-btn" onclick="filterCat('IND',this)">IND</button>
<button class="cat-btn" onclick="filterCat('SPORTS',this)">SPORTS</button>
</div>

<div class="container">

<!-- PLAYER -->
<div class="player">
<video id="video" controls autoplay></video>
<div class="now" id="now">Loading...</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="search">
<input type="text" id="search" placeholder="Search Channel...">
</div>

<div id="list"></div>

</div>

</div>

<a class="telegram" href="https://t.me/iptvlinksm3u8" target="_blank">📢</a>

<script>
const video = document.getElementById("video");
const list = document.getElementById("list");
const now = document.getElementById("now");
const search = document.getElementById("search");

let channels = [];
let filtered = [];
let currentCat = "ALL";
let hls;

/* PLAY */
function play(url,name){
now.innerText = "Now Playing: " + name;
localStorage.setItem("lastChannel", JSON.stringify({url,name}));

if(hls) hls.destroy();

if(Hls.isSupported()){
hls = new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.ERROR, function (event, data) {
if (data.fatal) {
now.innerText = "⚠️ Error loading stream: " + name;
}
});
}else{
video.src = url;
video.onerror = () => {
now.innerText = "⚠️ Error loading stream: " + name;
};
}
}

/* RENDER */
function render(data){
list.innerHTML = "";

data.forEach((ch,i)=>{
const div = document.createElement("div");
div.className = "channel";

div.innerHTML = `
<img src="${ch.logo || 'https://via.placeholder.com/45'}" loading="lazy">
<div>${ch.name}</div>
`;

div.onclick = ()=>{
document.querySelectorAll(".channel")
.forEach(c=>c.classList.remove("active"));

div.classList.add("active");
play(ch.url,ch.name);
};

list.appendChild(div);
});

// Auto-play last channel if available
const last = JSON.parse(localStorage.getItem("lastChannel") || "null");
if(last){
play(last.url,last.name);
}else if(data.length>0){
list.firstChild.click();
}
}

/* CATEGORY FILTER */
function filterCat(cat,btn){
currentCat = cat;
document.querySelectorAll(".cat-btn")
.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
applyFilter();
}

/* APPLY FILTER */
function applyFilter(){
let data = channels;
if(currentCat !== "ALL"){
data = data.filter(c => c.group === currentCat);
}
const q = search.value.toLowerCase();
data = data.filter(c =>
c.name.toLowerCase().includes(q)
);
filtered = data;
render(filtered);
}

/* SEARCH */
search.addEventListener("input",applyFilter);

/* LOAD M3U */
fetch("index.m3u")
.then(res=>res.text())
.then(text=>{
const lines = text.split("\n");
for(let i=0;i<lines.length;i++){
if(lines[i].startsWith("#EXTINF")){
const line = lines[i];
const name = line.split(",").pop().trim();
const logo = (line.match(/tvg-logo="(.*?)"/) || [])[1] || "";
const group = (line.match(/group-title="(.*?)"/) || [])[1] || "BD";
const url = lines[i+1] ? lines[i+1].trim() : "";
if(url.startsWith("http")){
channels.push({name,logo,url,group});
}
}
}
now.innerText = channels.length + " Channels Loaded";
applyFilter();
});
</script>

</body>
</html>

<style>
body{

header{

    color:#00ffd5;
}

.telegram, .partner{

.telegram a, .partner a{
    display:inline-block;
    margin:5px;

}

}

#search{
    width:90%;
    padding:12px;
    margin:10px auto;

    border:none;
    border-radius:8px;

    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,255,218,0.4);

    font-size:18px;
    font-weight:bold;
    margin-bottom:5px;

}

    font-size:14px;
    color:#aaa;
}

footer{
    text-align:center;
    padding:15px;
    background:#1f1f1f;
    margin-top:20px;
    font-size:14px;
    color:#777;
}

    #search{
        width:95%;
    }

</head>

<body>

<header>📺 KBprotv Channels List</header>

<!-- Telegram Section -->
<div class="telegram">
    📢 Join Our Telegram
    <div>
        <a href="https://t.me/iptvlinksm3u8" target="_blank">📡 IPTV Channel</a>
    </div>
    <div>
        <a href="https://t.me/+55FHvHAuy0JlY2Y1" target="_blank">👥 Telegram Group</a>
    </div>
</div>

<!-- Partner Section -->
<div class="partner">
    📺 Partner TV:
    <a href="https://kbtvpro.totalh.net" target="_blank">kbtvpro.totalh.net</a>
    <br><br>
    💻 Git Partner:
    <a href="https://github.com/Mrbotrx/All-FREE-TV/" target="_blank">Visit GitHub</a>
</div>

<input type="text" id="search" placeholder="Search channel...">

<div class="container" id="channels">Loading channels...</div>

<footer>© KBprotv - Auto Updated from index.m3u</footer>

<script>
const playlistUrl = "index.m3u";
let channels = [];

fetch(playlistUrl)
.then(res => res.text())
.then(data => {
    const lines = data.split("\n");

    for(let i=0; i<lines.length; i++){
        if(lines[i].startsWith("#EXTINF")){
            const info = lines[i];
            const name = info.split(",")[1];

            let group = "Others";
            const groupMatch = info.match(/group-title="(.*?)"/);
            if(groupMatch){
                group = groupMatch[1];
            }

            channels.push({name, group});
        }
    }

    renderChannels(channels);
})
.catch(()=>{
    document.getElementById("channels").innerHTML="Playlist load failed!";
});

function renderChannels(list){
    const container = document.getElementById("channels");
    container.innerHTML="";

    list.forEach(c=>{
        const div = document.createElement("div");
        div.className="channel-card";

        const nameEl = document.createElement("div");
        nameEl.className="channel-name";
        nameEl.innerText=c.name;

        const groupEl = document.createElement("div");
        groupEl.className="channel-group";
        groupEl.innerText=c.group;

        div.appendChild(nameEl);
        div.appendChild(groupEl);
        container.appendChild(div);
    });
}

document.getElementById("search").addEventListener("input", function(){
    const value = this.value.toLowerCase();
    const filtered = channels.filter(c => 
        c.name.toLowerCase().includes(value)
    );
    renderChannels(filtered);
});
</script>

</body>
